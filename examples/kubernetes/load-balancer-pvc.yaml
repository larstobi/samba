apiVersion: v1
kind: Namespace
metadata:
  name: samba-load-balancer
---
apiVersion: v1
kind: Secret
metadata:
  name: samba-users
  namespace: samba-load-balancer
type: Opaque
stringData:
  USER: "smbuser;changeme;1000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: samba-config
  namespace: samba-load-balancer
data:
  TZ: "Europe/Oslo"
  WORKGROUP: "WORKGROUP"
  USERID: "1000"
  GROUPID: "1000"
  AVAHI: "false"
  WSDD: "false"
  PERMISSIONS: "true"
  GLOBAL: "server string = Samba on Kubernetes"
  SHARE: "Data;/share/data;yes;no;no;smbuser;none;none;Kubernetes PVC share"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: samba-data
  namespace: samba-load-balancer
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: samba
  namespace: samba-load-balancer
  labels:
    app.kubernetes.io/name: samba
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: samba
  template:
    metadata:
      labels:
        app.kubernetes.io/name: samba
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: samba
          image: larstobi/samba:1
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: samba-config
            - secretRef:
                name: samba-users
          ports:
            - name: netbios-ssn
              containerPort: 139
              protocol: TCP
            - name: smb
              containerPort: 445
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: smb
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - pgrep -x smbd >/dev/null
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /share
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: samba-data
---
apiVersion: v1
kind: Service
metadata:
  name: samba
  namespace: samba-load-balancer
  labels:
    app.kubernetes.io/name: samba
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: samba
  ports:
    - name: netbios-ssn
      port: 139
      targetPort: netbios-ssn
      protocol: TCP
    - name: smb
      port: 445
      targetPort: smb
      protocol: TCP
