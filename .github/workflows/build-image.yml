name: Docker Image CI

env:
  GHCR: ghcr.io
  DOCKER: docker.io
  IMAGENAME: samba
  IMAGE_VERSION: 1.0.0

on:
  push:
    branches: ["master"]
  schedule:
    - cron: "0 21 1 * *"

jobs:
  vulnerability-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Trivy filesystem scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"
  build-and-push:
    runs-on: ubuntu-latest
    needs:
      - vulnerability-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to the Github container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Prepare image tags
        id: image
        shell: bash
        run: |
          set -euo pipefail

          version="${IMAGE_VERSION}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "IMAGE_VERSION must use MAJOR.MINOR.PATCH format" >&2
            exit 1
          fi

          major="${version%%.*}"
          minor_patch="${version#*.}"
          minor="${major}.${minor_patch%%.*}"
          build_date="$(date -u +'%Y%m%d')"
          run_number="${GITHUB_RUN_NUMBER:?}"

          {
            echo "version=${version}"
            echo "major=${major}"
            echo "minor=${minor}"
            echo "build_tag=${version}-${build_date}.${run_number}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v6
          push: true
          tags: |
            ${{ env.GHCR }}/larstobi/${{ env.IMAGENAME }}:latest
            ${{ env.GHCR }}/larstobi/${{ env.IMAGENAME }}:${{ steps.image.outputs.major }}
            ${{ env.GHCR }}/larstobi/${{ env.IMAGENAME }}:${{ steps.image.outputs.minor }}
            ${{ env.GHCR }}/larstobi/${{ env.IMAGENAME }}:${{ steps.image.outputs.version }}
            ${{ env.GHCR }}/larstobi/${{ env.IMAGENAME }}:${{ steps.image.outputs.build_tag }}
            ${{ env.DOCKER }}/larstobi/${{ env.IMAGENAME }}:latest
            ${{ env.DOCKER }}/larstobi/${{ env.IMAGENAME }}:${{ steps.image.outputs.major }}
            ${{ env.DOCKER }}/larstobi/${{ env.IMAGENAME }}:${{ steps.image.outputs.minor }}
            ${{ env.DOCKER }}/larstobi/${{ env.IMAGENAME }}:${{ steps.image.outputs.version }}
            ${{ env.DOCKER }}/larstobi/${{ env.IMAGENAME }}:${{ steps.image.outputs.build_tag }}
  image-vulnerability-scan:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.GHCR }}/larstobi/${{ env.IMAGENAME }}:latest"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
